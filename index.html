<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Click Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 34%),
        linear-gradient(135deg, #dff6ff, #fef6e4 52%, #fde68a);
      color: #111827;
    }

    .layout {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 24px;
      align-items: start;
    }

    .game {
      text-align: center;
    }

    h1,
    h2 {
      margin-top: 0;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 8px;
    }

    .status {
      min-height: 1.5rem;
      font-size: 1.05rem;
      color: #475569;
    }

    .game-status {
      margin-bottom: 10px;
    }

    .hud {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 12px;
      font-size: 1.15rem;
      font-weight: bold;
      flex-wrap: wrap;
    }

    .play-area {
      position: relative;
      width: 100%;
      height: 70vh;
      min-height: 420px;
      border: 3px solid #1f2937;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.8)),
        radial-gradient(circle at top, rgba(59, 130, 246, 0.12), transparent 40%);
      overflow: hidden;
      box-shadow:
        0 26px 55px rgba(15, 23, 42, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    .target {
      position: absolute;
      width: 60px;
      height: 60px;
      border: none;
      left: 0;
      top: 0;
      border-radius: 18px;
      background:
        linear-gradient(145deg, #ff7a7a, #ef4444 52%, #c81e1e);
      box-shadow:
        0 16px 26px rgba(239, 68, 68, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        inset 0 -4px 10px rgba(127, 29, 29, 0.3);
      cursor: pointer;
      transition:
        box-shadow 0.2s ease,
        filter 0.2s ease;
      will-change: transform;
    }

    .target:hover {
      box-shadow:
        0 20px 34px rgba(239, 68, 68, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        inset 0 -4px 10px rgba(127, 29, 29, 0.32);
      filter: saturate(1.08);
    }

    .target:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      filter: grayscale(0.1);
    }

    .target.running {
      box-shadow:
        0 24px 38px rgba(239, 68, 68, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        inset 0 -4px 10px rgba(127, 29, 29, 0.3);
    }

    .scoreboard {
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.82));
      box-shadow:
        0 24px 48px rgba(15, 23, 42, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      text-align: left;
    }

    .scoreboard ol {
      margin: 0;
      padding-left: 24px;
    }

    .scoreboard li {
      margin-bottom: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: bold;
      color: #1f2937;
      background: rgba(248, 250, 252, 0.85);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
    }

    .empty-score {
      color: #64748b;
      font-weight: normal;
    }

    .replay-button {
      display: none;
      margin-top: 16px;
      padding: 12px 20px;
      border: none;
      border-radius: 999px;
      background: #1f2937;
      color: #ffffff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .replay-button:hover {
      background: #111827;
    }

    @media (max-width: 800px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .scoreboard {
        order: -1;
      }

      .play-area {
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <main class="game">
      <h1>Square Click Game</h1>
      <div class="status game-status" id="statusMessage">Click the square to start.</div>
      <div class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Time: <span id="timeLeft">15</span>s</div>
      </div>
      <div class="play-area" id="playArea">
        <button class="target" id="target" aria-label="Click the square"></button>
      </div>
      <button class="replay-button" id="replayButton" type="button">Replay</button>
    </main>

    <aside class="scoreboard">
      <h2>Top 5 Scores</h2>
      <ol id="scoreboardList"></ol>
    </aside>
  </div>

  <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore-compat.js"></script>
  <script>
    const playArea = document.getElementById("playArea");
    const target = document.getElementById("target");
    const scoreDisplay = document.getElementById("score");
    const timeLeftDisplay = document.getElementById("timeLeft");
    const statusMessage = document.getElementById("statusMessage");
    const scoreboardList = document.getElementById("scoreboardList");
    const replayButton = document.getElementById("replayButton");

    const targetSize = 60;
    const roundLength = 15;
    const scoresCollectionName = "scores";
    const localScoresKey = "square-click-top-5-local";
    const scoreboardClearedKey = "square-click-scoreboard-cleared-v1";
    const motionDurationMs = 350;
    const spiralDurationMaxMs = 900;

    let score = 0;
    let timeLeft = roundLength;
    let timerId = null;
    let gameStarted = false;
    let gameOver = false;
    let topScores = [];
    let db = null;
    let usingFirestore = false;
    let unsubscribeScores = null;
    let currentX = 0;
    let currentY = 0;
    let useSpiralPathNext = false;

    // Real Firebase config detected below. If this object is ever removed,
    // replace it with your real project config instead of placeholder values.
    const firebaseConfig = {
      apiKey: "AIzaSyC-QFKRSQ8IFZE9DopixUOMV4xQJLRig6w",
      authDomain: "square-clicking-game.firebaseapp.com",
      projectId: "square-clicking-game",
      storageBucket: "square-clicking-game.firebasestorage.app",
      messagingSenderId: "724285223780",
      appId: "1:724285223780:web:0908ed42d3e80dbbf6c071",
      measurementId: "G-CJ8QPHYMVE"
    };

    function hasRealFirebaseConfig() {
      return Object.values(firebaseConfig).every(
        (value) => typeof value === "string" && !value.startsWith("PASTE_YOUR_")
      );
    }

    function renderTimer() {
      timeLeftDisplay.textContent = timeLeft;
    }

    function renderScore() {
      scoreDisplay.textContent = score;
    }

    function setTargetPosition(x, y) {
      currentX = x;
      currentY = y;
      target.style.transform = "translate(" + x + "px, " + y + "px)";
    }

    function getMovementBounds() {
      return {
        maxX: Math.max(playArea.clientWidth - targetSize, 0),
        maxY: Math.max(playArea.clientHeight - targetSize, 0)
      };
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function randomBetween(min, max) {
      return min + (Math.random() * (max - min));
    }

    function getRandomTargetPosition() {
      const bounds = getMovementBounds();

      return {
        x: Math.floor(Math.random() * Math.max(bounds.maxX, 1)),
        y: Math.floor(Math.random() * Math.max(bounds.maxY, 1))
      };
    }

    function getRandomCurveControlPoint(startX, startY, nextX, nextY) {
      const bounds = getMovementBounds();
      const deltaX = nextX - startX;
      const deltaY = nextY - startY;
      const distance = Math.hypot(deltaX, deltaY) || 1;
      const midpointX = (startX + nextX) / 2;
      const midpointY = (startY + nextY) / 2;
      const tangentX = deltaX / distance;
      const tangentY = deltaY / distance;
      const perpendicularX = -deltaY / distance;
      const perpendicularY = deltaX / distance;
      const maxCurveOffset = Math.min(140, Math.max(40, distance * 0.45));
      const minCurveOffset = Math.max(24, maxCurveOffset * 0.45);

      for (let attempt = 0; attempt < 10; attempt += 1) {
        const arcDirection = Math.random() < 0.5 ? -1 : 1;
        const curveOffset = randomBetween(minCurveOffset, maxCurveOffset) * arcDirection;
        const tangentShift = randomBetween(-distance * 0.18, distance * 0.18);
        const controlX = midpointX + (perpendicularX * curveOffset) + (tangentX * tangentShift);
        const controlY = midpointY + (perpendicularY * curveOffset) + (tangentY * tangentShift);

        if (
          controlX >= 0
          && controlX <= bounds.maxX
          && controlY >= 0
          && controlY <= bounds.maxY
        ) {
          return { x: controlX, y: controlY };
        }
      }

      return {
        x: clamp(midpointX, 0, bounds.maxX),
        y: clamp(midpointY, 0, bounds.maxY)
      };
    }

    function normalizeAngle(angle) {
      const fullTurn = Math.PI * 2;
      let normalized = angle % fullTurn;

      if (normalized < 0) {
        normalized += fullTurn;
      }

      return normalized;
    }

    function getShortestAngleDelta(startAngle, endAngle, direction) {
      const fullTurn = Math.PI * 2;
      const normalizedStart = normalizeAngle(startAngle);
      const normalizedEnd = normalizeAngle(endAngle);

      if (direction > 0) {
        return normalizedEnd >= normalizedStart
          ? normalizedEnd - normalizedStart
          : (fullTurn - normalizedStart) + normalizedEnd;
      }

      return normalizedEnd <= normalizedStart
        ? normalizedEnd - normalizedStart
        : -((fullTurn - normalizedEnd) + normalizedStart);
    }

    function pathFitsBounds(profile) {
      const sampleCount = 24;

      for (let sampleIndex = 0; sampleIndex <= sampleCount; sampleIndex += 1) {
        const progress = sampleIndex / sampleCount;
        const angle = profile.startAngle + (profile.sweepAngle * progress);
        const x = profile.centerX + (Math.cos(angle) * profile.radius);
        const y = profile.centerY + (Math.sin(angle) * profile.radius);

        if (
          x < 0
          || x > profile.bounds.maxX
          || y < 0
          || y > profile.bounds.maxY
        ) {
          return false;
        }
      }

      return true;
    }

    function getRandomOrbitProfile(startX, startY, nextX, nextY) {
      const bounds = getMovementBounds();
      const deltaX = nextX - startX;
      const deltaY = nextY - startY;
      const distance = Math.hypot(deltaX, deltaY);

      if (distance < 1) {
        return {
          bounds,
          centerX: startX,
          centerY: startY,
          radius: 0,
          startAngle: 0,
          sweepAngle: 0
        };
      }

      const midpointX = (startX + nextX) / 2;
      const midpointY = (startY + nextY) / 2;
      const perpendicularX = -deltaY / distance;
      const perpendicularY = deltaX / distance;
      const minRadius = Math.max(distance / 2 + 8, 40);
      const maxRadius = Math.max(minRadius + 10, Math.min(220, distance * 1.35));
      const extraTurns = Math.random() < 0.7 ? 1 : 2;

      for (let attempt = 0; attempt < 18; attempt += 1) {
        const radius = randomBetween(minRadius, maxRadius);
        const offsetFromMidpoint = Math.sqrt(Math.max((radius * radius) - ((distance * distance) / 4), 0));
        const direction = Math.random() < 0.5 ? -1 : 1;
        const centerSide = Math.random() < 0.5 ? -1 : 1;
        const centerX = midpointX + (perpendicularX * offsetFromMidpoint * centerSide);
        const centerY = midpointY + (perpendicularY * offsetFromMidpoint * centerSide);
        const startAngle = Math.atan2(startY - centerY, startX - centerX);
        const endAngle = Math.atan2(nextY - centerY, nextX - centerX);
        const baseSweep = getShortestAngleDelta(startAngle, endAngle, direction);
        const sweepAngle = baseSweep + (direction * extraTurns * Math.PI * 2);
        const profile = {
          bounds,
          centerX,
          centerY,
          radius,
          startAngle,
          sweepAngle
        };

        if (pathFitsBounds(profile)) {
          return profile;
        }
      }

      return {
        bounds,
        centerX: midpointX,
        centerY: midpointY,
        radius: distance / 2,
        startAngle: Math.atan2(startY - midpointY, startX - midpointX),
        sweepAngle: Math.PI
      };
    }

    function getSpiralDuration(profile) {
      const radiusFactor = clamp(profile.radius / 220, 0, 1);
      return Math.round(motionDurationMs + ((spiralDurationMaxMs - motionDurationMs) * radiusFactor));
    }

    function animateTargetAlongCurve(nextX, nextY) {
      if (target.moveAnimationFrame) {
        window.cancelAnimationFrame(target.moveAnimationFrame);
      }

      const startX = currentX;
      const startY = currentY;
      const controlPoint = getRandomCurveControlPoint(startX, startY, nextX, nextY);
      const startTime = performance.now();
      const durationMs = motionDurationMs;

      function step(timestamp) {
        const elapsed = timestamp - startTime;
        const linearProgress = Math.min(elapsed / durationMs, 1);
        const easedProgress = 1 - Math.pow(1 - linearProgress, 3);
        const inverse = 1 - easedProgress;
        const x = (inverse * inverse * startX)
          + (2 * inverse * easedProgress * controlPoint.x)
          + (easedProgress * easedProgress * nextX);
        const y = (inverse * inverse * startY)
          + (2 * inverse * easedProgress * controlPoint.y)
          + (easedProgress * easedProgress * nextY);

        setTargetPosition(x, y);

        if (linearProgress < 1) {
          target.moveAnimationFrame = window.requestAnimationFrame(step);
          return;
        }

        target.moveAnimationFrame = null;
        setTargetPosition(nextX, nextY);
      }

      target.moveAnimationFrame = window.requestAnimationFrame(step);
      return durationMs;
    }

    function animateTargetAlongSpiral(nextX, nextY) {
      if (target.moveAnimationFrame) {
        window.cancelAnimationFrame(target.moveAnimationFrame);
      }

      const startX = currentX;
      const startY = currentY;
      const orbitProfile = getRandomOrbitProfile(startX, startY, nextX, nextY);
      const startTime = performance.now();
      const durationMs = getSpiralDuration(orbitProfile);

      function step(timestamp) {
        const elapsed = timestamp - startTime;
        const linearProgress = Math.min(elapsed / durationMs, 1);
        const easedProgress = 1 - Math.pow(1 - linearProgress, 3);
        const angle = orbitProfile.startAngle + (orbitProfile.sweepAngle * easedProgress);
        const x = clamp(
          orbitProfile.centerX + (Math.cos(angle) * orbitProfile.radius),
          0,
          orbitProfile.bounds.maxX
        );
        const y = clamp(
          orbitProfile.centerY + (Math.sin(angle) * orbitProfile.radius),
          0,
          orbitProfile.bounds.maxY
        );

        setTargetPosition(x, y);

        if (linearProgress < 1) {
          target.moveAnimationFrame = window.requestAnimationFrame(step);
          return;
        }

        target.moveAnimationFrame = null;
        setTargetPosition(nextX, nextY);
      }

      target.moveAnimationFrame = window.requestAnimationFrame(step);
      return durationMs;
    }

    function renderScoreboard() {
      scoreboardList.innerHTML = "";

      if (topScores.length === 0) {
        const emptyItem = document.createElement("li");
        emptyItem.className = "empty-score";
        emptyItem.textContent = "No scores yet";
        scoreboardList.appendChild(emptyItem);
        return;
      }

      topScores.forEach((entry) => {
        const item = document.createElement("li");
        item.textContent = entry.name + " - " + entry.score;
        scoreboardList.appendChild(item);
      });
    }

    function loadLocalScores() {
      try {
        const savedScores = window.localStorage.getItem(localScoresKey);
        if (!savedScores) {
          topScores = [];
          renderScoreboard();
          return;
        }

        const parsedScores = JSON.parse(savedScores);
        if (!Array.isArray(parsedScores)) {
          topScores = [];
          renderScoreboard();
          return;
        }

        topScores = parsedScores
          .map((entry) => ({
            name: entry.name || "Anonymous",
            score: Number(entry.score) || 0
          }))
          .sort((a, b) => b.score - a.score)
          .slice(0, 5);

        renderScoreboard();
      } catch (error) {
        topScores = [];
        renderScoreboard();
        console.error(error);
      }
    }

    function saveLocalScores() {
      window.localStorage.setItem(localScoresKey, JSON.stringify(topScores));
    }

    function addLocalScore(playerName, finalScore) {
      topScores.push({
        name: playerName,
        score: finalScore
      });
      topScores.sort((a, b) => b.score - a.score);
      topScores = topScores.slice(0, 5);
      saveLocalScores();
      renderScoreboard();
    }

    function qualifiesForTopFive(finalScore) {
      if (topScores.length < 5) {
        return true;
      }

      return finalScore > topScores[topScores.length - 1].score;
    }

    function hasClearedScoreboardOnce() {
      return window.localStorage.getItem(scoreboardClearedKey) === "true";
    }

    function markScoreboardCleared() {
      window.localStorage.setItem(scoreboardClearedKey, "true");
    }

    function clearLocalScoreboard() {
      topScores = [];
      window.localStorage.removeItem(localScoresKey);
      renderScoreboard();
    }

    function clearFirestoreScoresOnce() {
      if (!db || hasClearedScoreboardOnce()) {
        return Promise.resolve();
      }

      clearLocalScoreboard();

      return db.collection(scoresCollectionName)
        .get()
        .then((snapshot) => {
          if (snapshot.empty) {
            markScoreboardCleared();
            return;
          }

          const batch = db.batch();
          snapshot.forEach((scoreDoc) => {
            batch.delete(scoreDoc.ref);
          });

          return batch.commit().then(() => {
            markScoreboardCleared();
          });
        })
        .catch((error) => {
          console.error(error);
          throw error;
        });
    }

    function setupFirestore() {
      if (!hasClearedScoreboardOnce()) {
        clearLocalScoreboard();
      }

      if (!hasRealFirebaseConfig()) {
        usingFirestore = false;
        if (!hasClearedScoreboardOnce()) {
          markScoreboardCleared();
        }
        loadLocalScores();
        return;
      }

      try {
        const app = firebase.apps.length
          ? firebase.app()
          : firebase.initializeApp(firebaseConfig);
        db = app.firestore ? app.firestore() : firebase.firestore();
        usingFirestore = true;

        clearFirestoreScoresOnce()
          .catch(() => {
            // Keep the game working even if the one-time cleanup fails.
          })
          .finally(() => {
            unsubscribeScores = db.collection(scoresCollectionName)
              .orderBy("score", "desc")
              .limit(5)
              .onSnapshot(
                (snapshot) => {
                  topScores = snapshot.docs.map((doc) => {
                    const data = doc.data();
                    return {
                      name: data.name || "Anonymous",
                      score: Number(data.score) || 0
                    };
                  });
                  topScores.sort((a, b) => b.score - a.score);
                  topScores = topScores.slice(0, 5);
                  renderScoreboard();
                },
                (error) => {
                  usingFirestore = false;
                  loadLocalScores();
                  console.error(error);
                }
              );
          });
      } catch (error) {
        usingFirestore = false;
        loadLocalScores();
        console.error(error);
      }
    }

    function saveScore(playerName, finalScore) {
      if (!usingFirestore || !db) {
        addLocalScore(playerName, finalScore);
        return Promise.resolve();
      }

      return db.collection(scoresCollectionName)
        .add({
          name: playerName,
          score: finalScore,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        })
        .catch((error) => {
          usingFirestore = false;
          addLocalScore(playerName, finalScore);
          throw error;
        });
    }

    function moveTarget(useCurve) {
      if (gameOver) {
        return;
      }

      const nextPosition = getRandomTargetPosition();
      target.classList.add("running");
      let animationDuration = motionDurationMs;
      if (useCurve) {
        if (useSpiralPathNext) {
          animationDuration = animateTargetAlongSpiral(nextPosition.x, nextPosition.y);
        } else {
          animationDuration = animateTargetAlongCurve(nextPosition.x, nextPosition.y);
        }
        useSpiralPathNext = !useSpiralPathNext;
      } else {
        if (target.moveAnimationFrame) {
          window.cancelAnimationFrame(target.moveAnimationFrame);
          target.moveAnimationFrame = null;
        }
        setTargetPosition(nextPosition.x, nextPosition.y);
      }
      window.clearTimeout(target.moveEffectTimeout);
      target.moveEffectTimeout = window.setTimeout(() => {
        target.classList.remove("running");
      }, animationDuration);
    }

    function finishGame() {
      if (gameOver) {
        return;
      }

      gameOver = true;
      window.clearInterval(timerId);
      target.disabled = true;
      replayButton.style.display = "inline-block";

      if (qualifiesForTopFive(score)) {
        const enteredName = window.prompt("You made the Top 5! Enter your name:", "Player");
        const playerName = enteredName === null ? "Anonymous" : enteredName.trim() || "Anonymous";
        saveScore(playerName, score)
          .then(() => {
            statusMessage.textContent = "Game over. " + playerName + " entered the Top 5 with " + score + ".";
          })
          .catch((error) => {
            statusMessage.textContent = "Game over. Firestore failed, so the score was saved locally instead.";
            console.error(error);
          });
        return;
      }

      statusMessage.textContent = "Game over. Final score: " + score + ".";
    }

    function startTimer() {
      if (gameStarted) {
        return;
      }

      gameStarted = true;
      statusMessage.textContent = "Go!";

      timerId = window.setInterval(() => {
        timeLeft -= 1;
        renderTimer();

        if (timeLeft <= 0) {
          timeLeft = 0;
          renderTimer();
          finishGame();
        }
      }, 1000);
    }

    function resetGame() {
      window.clearInterval(timerId);
      window.clearTimeout(target.moveEffectTimeout);
      if (target.moveAnimationFrame) {
        window.cancelAnimationFrame(target.moveAnimationFrame);
        target.moveAnimationFrame = null;
      }
      score = 0;
      timeLeft = roundLength;
      timerId = null;
      gameStarted = false;
      gameOver = false;
      target.disabled = false;
      replayButton.style.display = "none";
      statusMessage.textContent = "Click the square to start.";
      renderScore();
      renderTimer();
      moveTarget(false);
    }

    target.addEventListener("click", () => {
      if (gameOver) {
        return;
      }

      if (!gameStarted) {
        startTimer();
      }

      score += 1;
      renderScore();
      moveTarget(true);
    });

    replayButton.addEventListener("click", resetGame);

    renderScoreboard();
    renderScore();
    renderTimer();
    setupFirestore();
    window.addEventListener("load", () => moveTarget(false));
    window.addEventListener("resize", () => moveTarget(false));
  </script>
</body>
</html>
